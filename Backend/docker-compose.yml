version: "3.9"

services:
  db:
    image: postgres:15
    container_name: secondbrain_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: secondbrain
    ports:
      - "5433:5432" # maps container port to host port
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
